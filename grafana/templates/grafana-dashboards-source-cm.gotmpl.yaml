{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ base $path | trimSuffix ".json" }}-source
  labels:
    app.kubernetes.io/name: {{ include "grafana.name" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
data:
  {{ base $path }}: {{ $.Files.Get $path | quote }}
{{- end }}
{{- range $path, $_ := .Files.Glob "dashboards/*.jsonnet" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ base $path | trimSuffix ".jsonnet" }}-source
  labels:
    app.kubernetes.io/name: {{ include "grafana.name" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
data:
  {{ base $path }}: {{ $.Files.Get $path | quote }}
{{- end }}
