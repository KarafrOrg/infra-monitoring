apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: {{ include "grafana.fullname" . }}-render
  labels:
    app.kubernetes.io/name: {{ include "grafana.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  entrypoint: render-grafana-dashboards
  serviceAccountName: {{ .Values.argo.serviceAccount | default "grafana-renderer" }}
  ttlStrategy:
    secondsAfterCompletion: {{ .Values.argo.ttlSecondsAfterCompletion | default 600 }}

  volumes:
    - name: dashboards
      configMap:
        name: {{ .Values.grafana.dashboards.configMapName | default "grafana-dashboards" }}

  templates:
    - name: list-dashboards
      script:
        image: alpine:latest
        command: ["/bin/sh"]
        source: |
          set -e
          DASHBOARD_DIR="/dashboards"
          ITEMS="["
          for f in "$DASHBOARD_DIR"/*.json "$DASHBOARD_DIR"/*.jsonnet; do
            test -e "$f" {{ printf "||" }} continue
            BASENAME=$(basename "$f")
            ITEMS="$ITEMS\"$BASENAME\","
          done
          ITEMS="${ITEMS%,}]"
          echo "$ITEMS" > /tmp/dashboard-list.json
        volumeMounts:
          - name: dashboards
            mountPath: /dashboards
            readOnly: true
      outputs:
        parameters:
          - name: dashboard-list
            valueFrom:
              path: /tmp/dashboard-list.json

    - name: render-grafana-dashboards
      steps:
        - - name: list-dashboards
            template: list-dashboards
        - - name: render-each-dashboard
            template: render-dashboard
            arguments:
              parameters:
                - name: dashboard-file
                  value: {{ `"{{item}}"` }}
            withParam: {{ `"{{steps.list-dashboards.outputs.parameters.dashboard-list}}"` }}

    - name: render-dashboard
      inputs:
        parameters:
          - name: dashboard-file
      container:
        image: ghcr.io/grafana/jsonnet-build:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            DASHBOARD_FILE={{ `"{{inputs.parameters.dashboard-file}}"` }}
            DASHBOARD_NAME=$(basename "$DASHBOARD_FILE" .jsonnet)
            DASHBOARD_NAME=$(basename "$DASHBOARD_NAME" .json)
            echo "Processing dashboard: $DASHBOARD_FILE -> $DASHBOARD_NAME.json"

            if [ "${DASHBOARD_FILE##*.}" = "jsonnet" ]; then
              echo "Rendering jsonnet file: $DASHBOARD_FILE"
              jsonnet "/dashboards/$DASHBOARD_FILE" > "/tmp/$DASHBOARD_NAME.json"
            else
              echo "Copying JSON file: $DASHBOARD_FILE"
              cp "/dashboards/$DASHBOARD_FILE" "/tmp/$DASHBOARD_NAME.json"
            fi

            echo "Creating configmap: $DASHBOARD_NAME"
            kubectl create configmap "$DASHBOARD_NAME" \
              --from-file="$DASHBOARD_NAME.json=/tmp/$DASHBOARD_NAME.json" \
              -n {{ .Release.Namespace }} \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Successfully created configmap: $DASHBOARD_NAME"
        volumeMounts:
          - name: dashboards
            mountPath: /dashboards
            readOnly: true

