apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: {{ include "grafana.fullname" . }}-render-
  labels:
    app.kubernetes.io/name: {{ include "grafana.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  entrypoint: render-grafana-dashboards
  serviceAccountName: {{ .Values.argo.serviceAccount }}
  ttlStrategy:
    secondsAfterCompletion: {{ .Values.argo.ttlSecondsAfterCompletion }}

  templates:
    - name: list-dashboards
      container:
        image: alpine/k8s:1.28.13
        command: [ "/bin/sh", "-c" ]
        args:
          - |
            set -e
            apk add --no-cache jq
            ITEMS=$(kubectl get configmaps -n {{ .Release.Namespace }} -l app.kubernetes.io/instance={{ .Release.Name }} -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -- '-source$' | sed 's/-source$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "$ITEMS" > /tmp/dashboard-list.json
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
          limits:
            memory: "10Mi"
            cpu: "100m"
      outputs:
        parameters:
          - name: dashboard-list
            valueFrom:
              path: /tmp/dashboard-list.json

    - name: render-grafana-dashboards
      steps:
        - - name: list-dashboards
            template: list-dashboards

        - - name: render-each-dashboard
            template: render-dashboard
            arguments:
              parameters:
                - name: dashboard-file
                  value: {{ `"{{item}}"` }}
            withParam: {{ `"{{steps.list-dashboards.outputs.parameters.dashboard-list}}"` }}

        - - name: cleanup-orphaned-dashboards
            template: cleanup-dashboards
            arguments:
              parameters:
                - name: dashboard-list
                  value: {{ `"{{steps.list-dashboards.outputs.parameters.dashboard-list}}"` }}

    - name: render-dashboard
      inputs:
        parameters:
          - name: dashboard-file
      container:
        image: alpine/k8s:1.28.13
        command: [ "/bin/sh", "-c" ]
        args:
          - |
            set -e

            # Install dependencies
            apk add --no-cache curl jq bash

            DASHBOARD_NAME={{ `"{{inputs.parameters.dashboard-file}}"` }}
            SOURCE_CM="$DASHBOARD_NAME-source"

            echo "Processing dashboard: $DASHBOARD_NAME from ConfigMap: $SOURCE_CM"

            # Get the source file from the ConfigMap
            SOURCE_FILES=$(kubectl get configmap "$SOURCE_CM" -n {{ .Release.Namespace }} -o jsonpath='{.data}' | jq -r 'keys[]')
            SOURCE_FILE=$(echo "$SOURCE_FILES" | head -n 1)

            echo "Source file: $SOURCE_FILE"

            # Extract and decode the content properly
            CONTENT=$(kubectl get configmap "$SOURCE_CM" -n {{ .Release.Namespace }} -o json | jq -r ".data[\"$SOURCE_FILE\"]")

            # Write content to file
            printf "%s" "$CONTENT" > "/tmp/source-$SOURCE_FILE"

            echo "Extracted file size: $(wc -c < /tmp/source-$SOURCE_FILE) bytes"

            # Check if it's a jsonnet file
            if [ "${SOURCE_FILE##*.}" = "jsonnet" ]; then
              echo "Rendering jsonnet file: $SOURCE_FILE"
              echo "Installing jsonnet and dependencies..."
              apk add --no-cache jsonnet git

              echo "Installing grafonnet library..."
              mkdir -p /tmp/jsonnet-libs
              cd /tmp/jsonnet-libs
              git clone --depth 1 https://github.com/grafana/grafonnet-lib.git

              echo "Rendering dashboard with grafonnet..."
              jsonnet -J /tmp/jsonnet-libs/grafonnet-lib "/tmp/source-$SOURCE_FILE" > "/tmp/$DASHBOARD_NAME.json"
            else
              echo "Copying JSON file: $SOURCE_FILE"
              cp "/tmp/source-$SOURCE_FILE" "/tmp/$DASHBOARD_NAME.json"
            fi

            echo "Creating configmap: $DASHBOARD_NAME"

            kubectl create configmap "$DASHBOARD_NAME" \
              --from-file="$DASHBOARD_NAME.json=/tmp/$DASHBOARD_NAME.json" \
              -n {{ .Release.Namespace }} \
              --dry-run=client -o yaml | \
            kubectl label -f - \
              app.kubernetes.io/name={{ include "grafana.name" . }} \
              app.kubernetes.io/instance={{ .Release.Name }} \
              {{ index .Values "grafana" "sidecar" "dashboards" "label" }}={{ index .Values "grafana" "sidecar" "dashboards" "labelValue" | quote }} \
              --local -o yaml | \
            kubectl apply -f -

            echo "Successfully created configmap: $DASHBOARD_NAME"
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
          limits:
            memory: "10Mi"
            cpu: "100m"

    - name: cleanup-dashboards
      inputs:
        parameters:
          - name: dashboard-list
      container:
        image: alpine/k8s:1.28.13
        command: [ "/bin/sh", "-c" ]
        args:
          - |
            set -e
            
            # Install dependencies
            apk add --no-cache jq
            
            CURRENT_DASHBOARDS='{{ `{{inputs.parameters.dashboard-list}}` }}'
            
            echo "Current dashboards from source: $CURRENT_DASHBOARDS"
            
            # Get all existing dashboard ConfigMaps (those with the grafana-dashboard label)
            EXISTING_CMS=$(kubectl get configmaps -n {{ .Release.Namespace }} \
              -l {{ index .Values "grafana" "sidecar" "dashboards" "label" }}={{ index .Values "grafana" "sidecar" "dashboards" "labelValue" }} \
              -o jsonpath='{.items[*].metadata.name}')
            
            echo "Existing dashboard ConfigMaps: $EXISTING_CMS"
            
            echo "Checking for orphaned dashboards to delete..."
            
            # Check each existing ConfigMap
            for cm in $EXISTING_CMS; do
              # Skip if it ends with -source (those are source ConfigMaps)
              if echo "$cm" | grep -q -- '-source$'; then
                echo "Skipping source ConfigMap: $cm"
                continue
              fi
              
              # Check if this dashboard still exists in current list using jq
              # We need to check if the cm name is in the JSON array
              FOUND=$(echo "$CURRENT_DASHBOARDS" | jq -r --arg name "$cm" 'any(.[]; . == $name)')
              
              if [ "$FOUND" = "true" ]; then
                echo "Keeping: $cm (still exists in source)"
              else
                echo "Deleting: $cm (no longer exists in source)"
                kubectl delete configmap "$cm" -n {{ .Release.Namespace }}
              fi
            done
            
            echo "Cleanup complete"
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
          limits:
            memory: "10Mi"
            cpu: "100m"
