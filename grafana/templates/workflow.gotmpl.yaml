apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: {{ include "grafana.fullname" . }}-render
  labels:
    app.kubernetes.io/name: {{ include "grafana.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  entrypoint: render-grafana-dashboards
  serviceAccountName: {{ .Values.argo.serviceAccount }}
  ttlStrategy:
    secondsAfterCompletion: {{ .Values.argo.ttlSecondsAfterCompletion }}

  templates:
    - name: list-dashboards
      container:
        image: alpine/k8s:1.28.13
        command: [ "/bin/sh", "-c" ]
        args:
          - |
            set -e
            apk add --no-cache jq
            ITEMS=$(kubectl get configmaps -n {{ .Release.Namespace }} -l app.kubernetes.io/instance={{ .Release.Name }} -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -- '-source$' | sed 's/-source$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "$ITEMS" > /tmp/dashboard-list.json
      outputs:
        parameters:
          - name: dashboard-list
            valueFrom:
              path: /tmp/dashboard-list.json

    - name: render-grafana-dashboards
      steps:
        - - name: list-dashboards
            template: list-dashboards
        - - name: render-each-dashboard
            template: render-dashboard
            arguments:
              parameters:
                - name: dashboard-file
                  value: {{ `"{{item}}"` }}
            withParam: {{ `"{{steps.list-dashboards.outputs.parameters.dashboard-list}}"` }}

    - name: render-dashboard
      inputs:
        parameters:
          - name: dashboard-file
      container:
        image: alpine/k8s:1.28.13
        command: [ "/bin/sh", "-c" ]
        args:
          - |
            set -e

            # Install dependencies
            apk add --no-cache curl jq bash

            DASHBOARD_NAME={{ `"{{inputs.parameters.dashboard-file}}"` }}
            SOURCE_CM="$DASHBOARD_NAME-source"

            echo "Processing dashboard: $DASHBOARD_NAME from ConfigMap: $SOURCE_CM"

            # Get the source file from the ConfigMap
            SOURCE_FILES=$(kubectl get configmap "$SOURCE_CM" -n {{ .Release.Namespace }} -o jsonpath='{.data}' | jq -r 'keys[]')
            SOURCE_FILE=$(echo "$SOURCE_FILES" | head -n 1)

            echo "Source file: $SOURCE_FILE"
            kubectl get configmap "$SOURCE_CM" -n {{ .Release.Namespace }} -o jsonpath="{.data['$SOURCE_FILE']}" > "/tmp/source-$SOURCE_FILE"

            # Check if it's a jsonnet file
            if [ "${SOURCE_FILE##*.}" = "jsonnet" ]; then
              echo "Rendering jsonnet file: $SOURCE_FILE"
              echo "Installing jsonnet..."
              curl -Lo /tmp/jsonnet https://github.com/google/go-jsonnet/releases/download/v0.20.0/go-jsonnet_0.20.0_Linux_x86_64
              chmod +x /tmp/jsonnet
              /tmp/jsonnet "/tmp/source-$SOURCE_FILE" > "/tmp/$DASHBOARD_NAME.json"
            else
              echo "Copying JSON file: $SOURCE_FILE"
              cp "/tmp/source-$SOURCE_FILE" "/tmp/$DASHBOARD_NAME.json"
            fi

            echo "Creating configmap: $DASHBOARD_NAME"
            kubectl create configmap "$DASHBOARD_NAME" \
              --from-file="$DASHBOARD_NAME.json=/tmp/$DASHBOARD_NAME.json" \
              -n {{ .Release.Namespace }} \
              --dry-run=client -o yaml | \
            kubectl label -f - \
              app.kubernetes.io/name={{ include "grafana.name" . }} \
              app.kubernetes.io/instance={{ .Release.Name }} \
              {{ index .Values "grafana" "sidecar" "dashboards" "label" }}={{ index .Values "grafana" "sidecar" "dashboards" "labelValue" | quote }} \
              --local -o yaml | \
            kubectl apply -f -

            echo "Successfully created configmap: $DASHBOARD_NAME"

