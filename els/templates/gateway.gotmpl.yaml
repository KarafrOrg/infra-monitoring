apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kibana
spec:
  gatewayClassName: cloudflare
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.kibana.ingress.domain | quote }}
      allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io	
            kind: HTTPRoute
        namespaces:
          from: Same
